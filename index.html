<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>실시간 수업 설문</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrap">
    <section class="vote-box">
      <h1 id="questionTitle">질문을 불러오는 중...</h1>
<p>하나를 선택하면 실시간 결과에 반영됩니다.</p>

<div id="buttons" class="buttons"></div>

<p id="message"></p>
    </section>

    <section class="result-box">
      <h2>실시간 결과</h2>

<div id="resultArea"></div>

<div class="total">
  총 참여자: <span id="totalCount">0</span>명
</div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
